<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FinTrack - Expenses</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="css/style.css" />
</head>
<body data-page="expenses">
  <nav class="navbar navbar-expand-lg sticky-top app-navbar">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html"><i class="bi bi-wallet2 me-2"></i>FinTrack</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="mainNav">
        <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-2">
          <li class="nav-item"><a class="nav-link" href="index.html">Dashboard</a></li>
          <li class="nav-item"><a class="nav-link active" href="expenses.html">Expenses</a></li>
          <li class="nav-item"><a class="nav-link" href="categories.html">Categories</a></li>
          <li class="nav-item"><a class="nav-link" href="budget.html">Budget</a></li>
          <li class="nav-item"><a class="nav-link" href="report.html">Report</a></li>
          <li class="nav-item dropdown">
            <button class="btn btn-icon position-relative" data-bs-toggle="dropdown" type="button">
              <i class="bi bi-bell"></i>
              <span id="notificationBadge" class="badge rounded-pill text-bg-danger notification-badge">0</span>
            </button>
            <div class="dropdown-menu dropdown-menu-end notification-menu p-0">
              <div class="d-flex justify-content-between align-items-center p-3 border-bottom">
                <h6 class="mb-0">Notifications</h6>
                <button class="btn btn-sm btn-outline-secondary" id="clearNotificationsBtn">Clear All</button>
              </div>
              <div id="notificationList" class="notification-list"></div>
            </div>
          </li>
          <li class="nav-item">
            <button class="btn btn-icon" id="themeToggleBtn" type="button"><i class="bi bi-moon-stars"></i></button>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="container py-4">
    <div class="d-flex flex-wrap justify-content-between align-items-center mb-4 gap-2">
      <div>
        <h1 class="page-title mb-1">Expenses</h1>
        <p class="text-secondary mb-0">Manage all your expense records from one place.</p>
      </div>
      <button class="btn btn-primary px-4" data-bs-toggle="modal" data-bs-target="#expenseModal" id="openExpenseModalBtn">
        <i class="bi bi-plus-lg me-2"></i>Add Expense
      </button>
    </div>

    <div class="card app-card mb-4">
      <div class="card-body">
        <div class="row g-3">
          <div class="col-md-4">
            <input type="text" id="expenseSearch" class="form-control" placeholder="Search expenses">
          </div>
          <div class="col-md-4">
            <select id="expenseCategoryFilter" class="form-select">
              <option value="all">All Categories</option>
            </select>
          </div>
          <div class="col-md-4">
            <select id="expenseSort" class="form-select">
              <option value="newest">Sort by Newest</option>
              <option value="oldest">Sort by Oldest</option>
              <option value="amountHigh">Amount: High to Low</option>
              <option value="amountLow">Amount: Low to High</option>
            </select>
          </div>
        </div>
      </div>
    </div>

    <div class="card app-card">
      <div class="table-responsive">
        <table class="table align-middle mb-0">
          <thead>
            <tr>
              <th>Title</th>
              <th>Category</th>
              <th>Amount</th>
              <th>Date</th>
              <th>Note</th>
              <th class="text-center">Actions</th>
            </tr>
          </thead>
          <tbody id="expenseTableBody"></tbody>
        </table>
      </div>
    </div>
  </main>

  <div class="modal fade" id="expenseModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <form id="expenseForm">
          <div class="modal-header">
            <h5 class="modal-title" id="expenseModalTitle">Add Expense</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <input type="hidden" id="expenseId">
            <div class="mb-3">
              <label class="form-label">Title</label>
              <input type="text" id="expenseTitle" class="form-control" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Amount</label>
              <input type="number" id="expenseAmount" class="form-control" min="1" step="0.01" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Category</label>
              <select id="expenseCategory" class="form-select" required></select>
            </div>
            <div class="mb-3">
              <label class="form-label">Date</label>
              <input type="date" id="expenseDate" class="form-control" required>
            </div>
            <div>
              <label class="form-label">Note</label>
              <textarea id="expenseNote" class="form-control" rows="3"></textarea>
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Close</button>
            <button type="submit" class="btn btn-primary">Save Expense</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <footer class="app-footer mt-4">
    <div class="container py-3 text-center">
      <small>FinTrack Personal Expense Tracker</small>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/data.js"></script>
  <script src="js/common.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/expenses.js"></script>
  <script src="js/categories.js"></script>
  <script src="js/budget.js"></script>
  <script src="js/report.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
